<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Список завдань</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; }
        .todo-container { background: white; border: 1px solid #ddd; border-radius: 8px; width: 350px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { background: #f9f9f9; padding: 15px; border-bottom: 1px solid #ddd; border-radius: 8px 8px 0 0; color: green; font-size: 20px; font-weight: bold; }
        .task { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 16px; color: #2c3e50; }
        .task:last-child { border-bottom: none; }
        .icon { width: 22px; height: 22px; margin-right: 15px; border-radius: 50%; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; }
        .done .icon { border-color: #4CAF50; color: #4CAF50; font-weight: bold; }
        .done span { text-decoration: line-through; color: green; font-weight: bold; }
    </style>
</head>
<body>
    <div class="todo-container">
        <div class="header">Список завдань</div>
        <div class="task done">
            <div class="icon">✓</div>
            <span>Опанувати HTML та CSS</span>
        </div>
        <div class="task done">
            <div class="icon">✓</div>
            <span>Опанувати Git та GitHub</span>
        </div>
        <div class="task">
            <div class="icon"></div>
            <span>Опанувати JavaScript</span>
        </div>
        <div class="task">
            <div class="icon"></div>
            <span>Опанувати Node.js</span>
        </div>
    </div>
</body>
</html>
