<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Генератор паролів</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Генератор паролів</h1>

  <div class="box">
    <div class="password-row">
      <input type="text" id="password" readonly>
      <button onclick="copyPassword()">Копія</button>
    </div>

    <input type="range" id="length" min="4" max="30" value="14">
    <span id="lengthValue">14</span>

    <div class="options">
      <label><input type="checkbox" id="lowercase" checked> az</label>
      <label><input type="checkbox" id="uppercase" checked> AZ</label>
      <label><input type="checkbox" id="numbers" checked> 0-9</label>
      <label><input type="checkbox" id="symbols" checked> !@#$%^</label>
    </div>

    <button class="generate" onclick="generatePassword()">Генерувати</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
