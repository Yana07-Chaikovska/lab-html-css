<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Список завдань</title>
</head>
<body>

  <h1>Список завдань</h1>

  <input type="text" id="taskInput" placeholder="Введіть нове завдання">
  <button onclick="addTask()">Додати завдання</button>

  <h2>Додані завдання</h2>
  <ul id="taskList">
    <li><input type="checkbox"> Опрацювати JavaScript</li>
    <li><input type="checkbox"> Опрацювати Node.js</li>
  </ul>

  <h2>Виконані завдання</h2>
  <ul>
    <li><input type="checkbox" checked> Опрацювати HTML та CSS</li>
    <li><input type="checkbox" checked> Опрацювати Git та GitHub</li>
  </ul>

  <script>
    function addTask() {
      const input = document.getElementById("taskInput");
      const taskList = document.getElementById("taskList");

      if (input.value.trim() === "") {
        alert("Введіть завдання");
        return;
      }

      const li = document.createElement("li");
      li.innerHTML = '<input type="checkbox"> ' + input.value;
      taskList.appendChild(li);

      input.value = "";
    }
  </script>

</body>
</html>
